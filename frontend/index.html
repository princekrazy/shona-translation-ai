<!doctype html>
<html>
  <head>
    <title>Shona Translator AI</title>
  </head>
  <body>
    <h2>English → Shona Translator</h2>

    <textarea id="text" placeholder="Enter English text"></textarea>
    <br /><br />
    <button id="btn">Translate</button>

    <h3>Result:</h3>
    <p id="result"></p>

    <script>
      document.getElementById("btn").addEventListener("click", async () => {
        const text = document.getElementById("text").value;

        const res = await fetch("http://127.0.0.1:8000/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();
        document.getElementById("result").innerText = data.translation;
      });
    </script>
  </body>
</html>
